openapi: 3.1.0
info:
  title: LaunchPilot Frontend-Backend API
  version: 0.2.0
  description: >
    Contract between the Next.js frontend and Java Spring Boot gateway for
    CSV ingestion, async agent execution, polling, and human approval.
servers:
  - url: /api
tags:
  - name: Import
  - name: Agent
paths:
  /import/csv:
    post:
      tags: [Import]
      operationId: importCsv
      summary: Upload SNS metrics CSV and index parsed rows into Elastic.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file, workspace_id, campaign_id]
              properties:
                file:
                  type: string
                  format: binary
                workspace_id:
                  type: string
                  minLength: 1
                campaign_id:
                  type: string
                  minLength: 1
                source_platform:
                  $ref: "#/components/schemas/Channel"
      responses:
        "201":
          description: CSV imported and indexed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCsvResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /agent/run:
    post:
      tags: [Agent]
      operationId: runAgent
      summary: Trigger an asynchronous agent run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunRequest"
      responses:
        "202":
          description: Agent run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /agent/runs/{agent_run_id}:
    get:
      tags: [Agent]
      operationId: getAgentRun
      summary: Poll an agent run and fetch result when available.
      parameters:
        - $ref: "#/components/parameters/AgentRunId"
      responses:
        "200":
          description: Current run state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /agent/actions/{agent_run_id}/approve:
    post:
      tags: [Agent]
      operationId: approveAgentPlan
      summary: Approve final experiments and persist immutable calendar/brief documents.
      parameters:
        - $ref: "#/components/parameters/AgentRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveExperimentPlanRequest"
      responses:
        "200":
          description: Human approval processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveExperimentPlanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Run is not waiting for approval or was already approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    AgentRunId:
      name: agent_run_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^run_[A-Za-z0-9_]+$"
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    DateRange:
      type: object
      additionalProperties: false
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    Channel:
      type: string
      enum: [youtube, tiktok, instagram, x, unknown]
    Confidence:
      type: string
      enum: [low, medium, medium_high, high]
    ImportCsvResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - import_id
        - workspace_id
        - campaign_id
        - indexed_count
        - failed_count
        - columns
        - created_at
      properties:
        ok:
          type: boolean
          const: true
        import_id:
          type: string
          pattern: "^imp_[A-Za-z0-9_]+$"
        workspace_id:
          type: string
        campaign_id:
          type: string
        indexed_count:
          type: integer
          minimum: 0
        failed_count:
          type: integer
          minimum: 0
        columns:
          type: array
          items:
            type: string
          minItems: 1
        created_at:
          type: string
          format: date-time
    AgentRunRequest:
      type: object
      additionalProperties: false
      required: [workspace_id, campaign_id, question, date_range]
      properties:
        workspace_id:
          type: string
          minLength: 1
        campaign_id:
          type: string
          minLength: 1
        question:
          type: string
          minLength: 1
          maxLength: 2000
        date_range:
          $ref: "#/components/schemas/DateRange"
        parent_brief_id:
          type:
            - string
            - "null"
          pattern: "^brief_[A-Za-z0-9_]+$"
    AgentRunAcceptedResponse:
      type: object
      additionalProperties: false
      required: [ok, agent_run_id, status, next_poll_url, created_at]
      properties:
        ok:
          type: boolean
          const: true
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        status:
          type: string
          const: PENDING
        next_poll_url:
          type: string
          pattern: "^/api/agent/runs/run_[A-Za-z0-9_]+$"
        created_at:
          type: string
          format: date-time
    AgentRunStatus:
      type: string
      enum:
        - PENDING
        - RUNNING_SIGNAL_DETECTION
        - RUNNING_EVIDENCE_SEARCH
        - RUNNING_HYPOTHESIS_GENERATION
        - RUNNING_EXPERIMENT_GENERATION
        - WAITING_FOR_APPROVAL
        - SUCCESS
        - FAILED
    AgentRunStatusResponse:
      type: object
      additionalProperties: false
      required:
        - agent_run_id
        - status
        - current_stage
        - retry_count
        - error_message
        - payload
        - tool_call_logs
      properties:
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        status:
          $ref: "#/components/schemas/AgentRunStatus"
        current_stage:
          type:
            - string
            - "null"
        retry_count:
          type: integer
          minimum: 0
        error_message:
          type:
            - string
            - "null"
        payload:
          oneOf:
            - $ref: "#/components/schemas/AgentResultPayload"
            - type: "null"
        tool_call_logs:
          type: array
          items:
            $ref: "#/components/schemas/ToolCallLog"
    AgentResultPayload:
      type: object
      additionalProperties: false
      required: [signals, hypotheses, experiment_plan]
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        hypotheses:
          type: array
          items:
            $ref: "#/components/schemas/Hypothesis"
        experiment_plan:
          $ref: "#/components/schemas/ExperimentPlan"
    Signal:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - title
        - description
        - metric_name
        - current_value
        - baseline_value
        - lift_ratio
        - date_window
        - confidence
        - evidence_refs
      properties:
        id:
          type: string
          pattern: "^sig_[A-Za-z0-9_]+$"
        type:
          type: string
          examples: [content_outperformance]
        title:
          type: string
        description:
          type: string
        metric_name:
          type: string
        current_value:
          type: number
        baseline_value:
          type: number
        lift_ratio:
          type: number
        date_window:
          $ref: "#/components/schemas/DateRange"
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence_refs:
          type: array
          items:
            type: string
    Hypothesis:
      type: object
      additionalProperties: false
      required:
        - id
        - signal_ids
        - statement
        - rationale
        - confidence
        - supporting_evidence_refs
        - caveats
      properties:
        id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        signal_ids:
          type: array
          items:
            type: string
            pattern: "^sig_[A-Za-z0-9_]+$"
        statement:
          type: string
        rationale:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        supporting_evidence_refs:
          type: array
          items:
            type: string
        caveats:
          type: array
          items:
            type: string
    ExperimentPlan:
      type: object
      additionalProperties: false
      required: [id, summary, overall_confidence, items]
      properties:
        id:
          type: string
          pattern: "^plan_[A-Za-z0-9_]+$"
        summary:
          type: string
        overall_confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentItem"
    ExperimentItem:
      type: object
      additionalProperties: false
      required:
        - id
        - hypothesis_id
        - title
        - channel
        - content_format
        - hook
        - cta
        - target_metric
        - success_criteria
        - scheduled_at
        - production_brief
      properties:
        id:
          type: string
          pattern: "^exp_[A-Za-z0-9_]+$"
        hypothesis_id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        title:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
        content_format:
          type: string
        hook:
          type: string
        cta:
          type: string
        target_metric:
          type: string
        success_criteria:
          type: string
        scheduled_at:
          type: string
          format: date-time
        production_brief:
          type: string
    ToolCallStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCESS, FAILED]
    ToolCallLog:
      type: object
      additionalProperties: false
      required: [sequence, tool_name, status, duration_ms]
      properties:
        sequence:
          type: integer
          minimum: 1
        tool_name:
          type: string
        status:
          $ref: "#/components/schemas/ToolCallStatus"
        duration_ms:
          type:
            - integer
            - "null"
          minimum: 0
        error_message:
          type:
            - string
            - "null"
    ApproveExperimentPlanRequest:
      type: object
      additionalProperties: false
      required: [experiment_plan_id, approved_by, final_experiments]
      properties:
        experiment_plan_id:
          type: string
          pattern: "^plan_[A-Za-z0-9_]+$"
        approved_by:
          type: string
          minLength: 1
        final_experiments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ExperimentItem"
    CalendarEventRef:
      type: object
      additionalProperties: false
      required: [event_id, title, scheduled_at]
      properties:
        event_id:
          type: string
          pattern: "^cal_[A-Za-z0-9_]+$"
        title:
          type: string
        scheduled_at:
          type: string
          format: date-time
    ApproveExperimentPlanResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - message
        - growth_brief_id
        - created_calendar_events
        - persisted_at
      properties:
        ok:
          type: boolean
          const: true
        message:
          type: string
        growth_brief_id:
          type: string
          pattern: "^brief_[A-Za-z0-9_]+$"
        created_calendar_events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEventRef"
        persisted_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
