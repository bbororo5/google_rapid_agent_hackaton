openapi: 3.1.0
info:
  title: LaunchPilot Frontend-Backend REST API
  version: 1.0.0
  description: >
    Current REST contract between the Next.js frontend and Java Spring Boot
    gateway. REST is limited to non-conversational resource upload. The live
    agent conversation is defined in asyncapi.yaml.
servers:
  - url: /api
tags:
  - name: Import
paths:
  /import/csv:
    post:
      tags: [Import]
      operationId: importCsv
      summary: Upload SNS metrics CSV and index parsed rows into Elastic.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file, workspace_id, campaign_id]
              properties:
                file:
                  type: string
                  format: binary
                workspace_id:
                  type: string
                  minLength: 1
                campaign_id:
                  type: string
                  minLength: 1
                source_platform:
                  $ref: "#/components/schemas/Channel"
      responses:
        "201":
          description: CSV imported and indexed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCsvResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
components:
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Channel:
      type: string
      enum: [youtube, tiktok, instagram, x, unknown]
    ImportCsvResponse:
      type: object
      additionalProperties: false
      required: [ok, import_id, workspace_id, campaign_id, indexed_count, failed_count, columns, created_at]
      properties:
        ok:
          type: boolean
          const: true
        import_id:
          type: string
          pattern: "^imp_[A-Za-z0-9_]+$"
        workspace_id:
          type: string
        campaign_id:
          type: string
        indexed_count:
          type: integer
          minimum: 0
        failed_count:
          type: integer
          minimum: 0
        columns:
          type: array
          minItems: 1
          items:
            type: string
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type:
                - object
                - "null"
