asyncapi: 2.6.0
info:
  title: LaunchPilot Conversation Stream
  version: 1.0.0
  description: >
    Current WebSocket contract between the Next.js frontend and Java Spring
    Boot gateway. The client sends one command shape, message.send. The server
    sends one frame shape, StreamMessage. UI behavior is determined only by
    StreamMessage.blocks[].kind.
servers:
  local:
    url: localhost:8080/api
    protocol: ws
  production:
    url: api.launchpilot.example/api
    protocol: wss
channels:
  /agent/threads/{thread_id}/stream:
    description: Live persisted conversation stream for one LaunchPilot agent thread.
    parameters:
      thread_id:
        description: Conversation thread identifier.
    subscribe:
      summary: Receive conversation messages, activities, documents, artifacts, approvals, results, and errors.
      message:
        $ref: "#/components/messages/StreamMessage"
    publish:
      summary: Send a free-form user turn or a UI action expressed as a message.
      message:
        $ref: "#/components/messages/MessageSendCommand"
components:
  messages:
    StreamMessage:
      name: StreamMessage
      title: Stream message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/StreamMessage"
      examples:
        - name: streamMessageFrame
          payload:
            $ref: "./examples/agent-stream-message-frame.json"
    MessageSendCommand:
      name: MessageSendCommand
      title: Message send command
      contentType: application/json
      payload:
        $ref: "#/components/schemas/MessageSendCommand"
      examples:
        - name: userTurn
          payload:
            $ref: "./examples/message-send-command.json"
  schemas:
    Channel:
      type: string
      enum: [youtube, tiktok, instagram, x, unknown]
    Confidence:
      type: string
      enum: [low, medium, medium_high, high]
    DateRange:
      type: object
      additionalProperties: false
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    CalendarEventRef:
      type: object
      additionalProperties: false
      required: [event_id, title, scheduled_at]
      properties:
        event_id:
          type: string
          pattern: "^cal_[A-Za-z0-9_]+$"
        title:
          type: string
        scheduled_at:
          type: string
          format: date-time
    Signal:
      type: object
      additionalProperties: false
      required: [id, type, title, description, metric_name, current_value, baseline_value, lift_ratio, date_window, confidence, evidence_refs]
      properties:
        id:
          type: string
          pattern: "^sig_[A-Za-z0-9_]+$"
        type:
          type: string
        title:
          type: string
        description:
          type: string
        metric_name:
          type: string
        current_value:
          type: number
        baseline_value:
          type: number
        lift_ratio:
          type: number
        date_window:
          $ref: "#/components/schemas/DateRange"
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence_refs:
          type: array
          items:
            type: string
    Hypothesis:
      type: object
      additionalProperties: false
      required: [id, signal_ids, statement, rationale, confidence, supporting_evidence_refs, caveats]
      properties:
        id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        signal_ids:
          type: array
          items:
            type: string
            pattern: "^sig_[A-Za-z0-9_]+$"
        statement:
          type: string
        rationale:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        supporting_evidence_refs:
          type: array
          items:
            type: string
        caveats:
          type: array
          items:
            type: string
    ExperimentItem:
      type: object
      additionalProperties: false
      required: [id, hypothesis_id, title, channel, content_format, hook, cta, target_metric, success_criteria, scheduled_at, production_brief]
      properties:
        id:
          type: string
          pattern: "^exp_[A-Za-z0-9_]+$"
        hypothesis_id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        title:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
        content_format:
          type: string
        hook:
          type: string
        cta:
          type: string
        target_metric:
          type: string
        success_criteria:
          type: string
        scheduled_at:
          type: string
          format: date-time
        production_brief:
          type: string
    ExperimentPlan:
      type: object
      additionalProperties: false
      required: [id, summary, overall_confidence, items]
      properties:
        id:
          type: string
          pattern: "^plan_[A-Za-z0-9_]+$"
        summary:
          type: string
        overall_confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentItem"
    AgentResultPayload:
      type: object
      additionalProperties: false
      required: [signals, hypotheses, experiment_plan]
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        hypotheses:
          type: array
          items:
            $ref: "#/components/schemas/Hypothesis"
        experiment_plan:
          $ref: "#/components/schemas/ExperimentPlan"
    ApprovalCommitResult:
      type: object
      additionalProperties: false
      required: [approval_id, growth_brief_id, created_calendar_events, persisted_at]
      properties:
        approval_id:
          type: string
          pattern: "^appr_[A-Za-z0-9_]+$"
        growth_brief_id:
          type: string
          pattern: "^brief_[A-Za-z0-9_]+$"
        created_calendar_events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEventRef"
        persisted_at:
          type: string
          format: date-time
    StreamMessageRole:
      type: string
      enum: [user, assistant, system]
    MessageAttachmentKind:
      type: string
      enum: [csv_import, growth_brief, document, artifact]
    MessageAttachment:
      type: object
      additionalProperties: false
      required: [kind, id]
      properties:
        kind:
          $ref: "#/components/schemas/MessageAttachmentKind"
        id:
          type: string
        title:
          type: string
        filename:
          type: string
    TextBlock:
      type: object
      additionalProperties: false
      required: [kind, text]
      properties:
        kind:
          type: string
          const: text
        text:
          type: string
    ActivityBlock:
      type: object
      additionalProperties: false
      required: [kind, title, status]
      properties:
        kind:
          type: string
          const: activity
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, running, done, failed]
        detail:
          type: string
    MarkdownDocumentBlock:
      type: object
      additionalProperties: false
      required: [kind, id, title, markdown]
      properties:
        kind:
          type: string
          const: markdown_document
        id:
          type: string
          pattern: "^doc_[A-Za-z0-9_]+$"
        title:
          type: string
        summary:
          type: string
        markdown:
          type: string
    ArtifactBlock:
      type: object
      additionalProperties: false
      required: [kind, id, artifact_kind, title, content]
      properties:
        kind:
          type: string
          const: artifact
        id:
          type: string
        artifact_kind:
          type: string
          enum: [signal, hypothesis, experiment_plan, growth_brief, generic]
        title:
          type: string
        content:
          description: Structured artifact payload.
    ApprovalBlock:
      type: object
      additionalProperties: false
      required: [kind, id, title, target_id, actions]
      properties:
        kind:
          type: string
          const: approval
        id:
          type: string
          pattern: "^appr_[A-Za-z0-9_]+$"
        title:
          type: string
        target_id:
          type: string
        actions:
          type: array
          items:
            type: string
            enum: [approve, reject, request_changes]
        payload:
          $ref: "#/components/schemas/AgentResultPayload"
    ResultBlock:
      type: object
      additionalProperties: false
      required: [kind, title]
      properties:
        kind:
          type: string
          const: result
        title:
          type: string
        detail:
          type: string
        approval_result:
          $ref: "#/components/schemas/ApprovalCommitResult"
        refs:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [kind, id, title]
            properties:
              kind:
                type: string
              id:
                type: string
              title:
                type: string
    ErrorBlock:
      type: object
      additionalProperties: false
      required: [kind, title]
      properties:
        kind:
          type: string
          const: error
        title:
          type: string
        detail:
          type: string
        retryable:
          type: boolean
    MessageBlock:
      oneOf:
        - $ref: "#/components/schemas/TextBlock"
        - $ref: "#/components/schemas/ActivityBlock"
        - $ref: "#/components/schemas/MarkdownDocumentBlock"
        - $ref: "#/components/schemas/ArtifactBlock"
        - $ref: "#/components/schemas/ApprovalBlock"
        - $ref: "#/components/schemas/ResultBlock"
        - $ref: "#/components/schemas/ErrorBlock"
    StreamMessage:
      type: object
      additionalProperties: false
      required: [id, thread_id, sequence, role, created_at, blocks]
      properties:
        id:
          type: string
          pattern: "^(msg|sys)_[A-Za-z0-9_]+$"
        thread_id:
          type: string
        sequence:
          type: integer
          minimum: 1
        role:
          $ref: "#/components/schemas/StreamMessageRole"
        created_at:
          type: string
          format: date-time
        blocks:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MessageBlock"
    MessageSendAction:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          enum: [approve, reject, request_changes, open_document, revise_artifact, cancel]
        target_id:
          type:
            - string
            - "null"
        payload:
          description: Optional small action payload.
    MessageSendCommand:
      type: object
      additionalProperties: false
      required: [command_id, type, thread_id, content, client_created_at]
      properties:
        command_id:
          type: string
        type:
          type: string
          const: message.send
        thread_id:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 4000
        attachments:
          type: array
          description: >
            Optional user-visible resources attached to this turn. Attachments
            carry metadata only; Java resolves and validates referenced uploads.
          items:
            $ref: "#/components/schemas/MessageAttachment"
        action:
          $ref: "#/components/schemas/MessageSendAction"
        client_created_at:
          type: string
          format: date-time
