asyncapi: 2.6.0
info:
  title: LaunchPilot Agent Runtime Stream
  version: 0.2.0
  description: >
    AsyncAPI contract for the active Campaign Agent WebSocket runtime between
    the Next.js frontend and Java Spring Boot gateway. REST endpoints create
    agent runs and provide coarse snapshots; live conversation delivery,
    approval/cancel commands, reconnect resume, and missed-event replay are
    handled over this WebSocket contract.
servers:
  local:
    url: localhost:8080/api
    protocol: ws
    description: Local Java gateway WebSocket server.
  production:
    url: api.launchpilot.example/api
    protocol: wss
    description: Production Java gateway WebSocket server.
channels:
  /agent/runs/{agent_run_id}/stream:
    description: Live persisted timeline, intervention, and reconnect recovery stream for one agent run.
    parameters:
      agent_run_id:
        description: Agent run identifier returned by POST /api/agent/run.
    subscribe:
      summary: Receive persisted timeline events and connection recovery control events.
      message:
        $ref: "#/components/messages/AgentStreamServerEvent"
    publish:
      summary: Resume a disconnected stream, request a full timeline replay, or send runtime commands.
      message:
        $ref: "#/components/messages/AgentStreamClientCommand"
components:
  messages:
    AgentStreamServerEvent:
      name: AgentStreamServerEvent
      title: Agent stream server event
      contentType: application/json
      payload:
        $ref: "#/components/schemas/AgentStreamServerEvent"
      examples:
        - name: userMessageCreated
          summary: Initial user question is persisted as a recoverable timeline event.
          payload:
            $ref: "./examples/agent-stream-user-message-created-event.json"
        - name: runStarted
          summary: Agent run enters the active runtime after REST run creation.
          payload:
            $ref: "./examples/agent-stream-run-started-event.json"
        - name: documentCreated
          summary: Agent publishes a markdown document that can be opened in the inspector.
          payload:
            $ref: "./examples/agent-stream-document-created-event.json"
        - name: observationCreated
          summary: Agent reports a grounded observation while analyzing evidence.
          payload:
            $ref: "./examples/agent-stream-observation-created-event.json"
        - name: approvalRequested
          summary: Agent pauses before creating business outputs.
          payload:
            $ref: "./examples/agent-stream-approval-requested-event.json"
        - name: approvalCommitted
          summary: Approval was committed and created business document identifiers are available.
          payload:
            $ref: "./examples/agent-stream-approval-committed-event.json"
        - name: resumeAccepted
          summary: Server accepted a resume request and will replay missed events.
          payload:
            $ref: "./examples/agent-stream-resume-accepted-event.json"
        - name: fullSyncRequired
          summary: Incremental replay is unavailable and the client must request full timeline replay.
          payload:
            $ref: "./examples/agent-stream-full-sync-required-event.json"
    AgentStreamClientCommand:
      name: AgentStreamClientCommand
      title: Agent stream client command
      contentType: application/json
      payload:
        $ref: "#/components/schemas/AgentStreamClientCommand"
      examples:
        - name: resumeConnection
          summary: Client reconnects and asks the server to replay missed events.
          payload:
            $ref: "./examples/agent-stream-resume-command.json"
        - name: requestFullSync
          summary: Client asks the server to replay the full persisted timeline over WebSocket.
          payload:
            $ref: "./examples/agent-stream-full-sync-command.json"
        - name: approvePlan
          summary: User approves the edited experiment plan and resumes the run.
          payload:
            $ref: "./examples/agent-stream-approval-approve-command.json"
        - name: cancelRun
          summary: User cancels the active run.
          payload:
            $ref: "./examples/agent-stream-cancel-command.json"
  schemas:
    DateRange:
      type: object
      additionalProperties: false
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    Channel:
      type: string
      enum: [youtube, tiktok, instagram, x, unknown]
    Confidence:
      type: string
      enum: [low, medium, medium_high, high]
    AgentRunStatus:
      type: string
      enum:
        - PENDING
        - RUNNING_SIGNAL_DETECTION
        - RUNNING_EVIDENCE_SEARCH
        - RUNNING_HYPOTHESIS_GENERATION
        - RUNNING_EXPERIMENT_GENERATION
        - WAITING_FOR_APPROVAL
        - SUCCESS
        - FAILED
        - CANCELLED
    AgentRunStage:
      type: string
      enum:
        - IMPORT_METRICS
        - DETECT_PERFORMANCE_SIGNAL
        - GROUND_WITH_EVIDENCE
        - GENERATE_HYPOTHESIS
        - DRAFT_EXPERIMENT_PLAN
        - WAIT_FOR_APPROVAL
        - APPLY_APPROVED_PLAN
    AgentStepStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, SKIPPED]
    AgentObservationKind:
      type: string
      enum: [progress, evidence, signal, hypothesis, plan, warning]
    ApprovalGateKind:
      type: string
      enum: [EXPERIMENT_PLAN, CREATE_GROWTH_BRIEF, CREATE_CALENDAR_EVENTS]
    AgentStreamServerEventType:
      type: string
      enum:
        - connection.resume_accepted
        - connection.replay_started
        - connection.replay_completed
        - connection.full_sync_required
        - connection.reauth_required
        - connection.session_expired
        - run.started
        - step.updated
        - user.message.created
        - assistant.message.created
        - document.created
        - observation.created
        - tool.updated
        - signal.detected
        - hypothesis.created
        - experiment_plan.drafted
        - approval.requested
        - approval.committed
        - run.paused
        - run.resumed
        - run.cancelled
        - run.completed
        - run.failed
    AgentStreamClientCommandType:
      type: string
      enum:
        - connection.resume
        - connection.full_sync
        - run.cancel
        - approval.update_payload
        - approval.approve
        - approval.reject
    AgentStepSnapshot:
      type: object
      additionalProperties: false
      required: [id, order, stage, status]
      properties:
        id:
          type: string
        order:
          type: integer
          minimum: 1
        stage:
          $ref: "#/components/schemas/AgentRunStage"
        status:
          $ref: "#/components/schemas/AgentStepStatus"
    AgentObservation:
      type: object
      additionalProperties: false
      required: [id, kind, title, summary]
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/AgentObservationKind"
        title:
          type: string
        summary:
          type: string
          description: User-visible summary. Do not include private chain-of-thought.
        evidence_refs:
          type: array
          items:
            type: string
    AgentMessage:
      type: object
      additionalProperties: false
      required: [message_id, role, content]
      properties:
        message_id:
          type: string
          pattern: "^msg_[A-Za-z0-9_]+$"
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          description: User-visible conversation content. Do not include private chain-of-thought.
    AgentDocumentKind:
      type: string
      enum: [evidence_scan, signal_summary, hypothesis_brief, experiment_plan, approval_receipt, generic]
    AgentDocument:
      type: object
      additionalProperties: false
      required: [document_id, kind, title, format, summary, content]
      properties:
        document_id:
          type: string
          pattern: "^doc_[A-Za-z0-9_]+$"
        kind:
          $ref: "#/components/schemas/AgentDocumentKind"
        title:
          type: string
        format:
          type: string
          const: markdown
        summary:
          type: string
        content:
          type: string
          description: User-visible markdown document content. Do not include private chain-of-thought.
    Signal:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - title
        - description
        - metric_name
        - current_value
        - baseline_value
        - lift_ratio
        - date_window
        - confidence
        - evidence_refs
      properties:
        id:
          type: string
          pattern: "^sig_[A-Za-z0-9_]+$"
        type:
          type: string
        title:
          type: string
        description:
          type: string
        metric_name:
          type: string
        current_value:
          type: number
        baseline_value:
          type: number
        lift_ratio:
          type: number
        date_window:
          $ref: "#/components/schemas/DateRange"
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence_refs:
          type: array
          items:
            type: string
    Hypothesis:
      type: object
      additionalProperties: false
      required:
        - id
        - signal_ids
        - statement
        - rationale
        - confidence
        - supporting_evidence_refs
        - caveats
      properties:
        id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        signal_ids:
          type: array
          items:
            type: string
            pattern: "^sig_[A-Za-z0-9_]+$"
        statement:
          type: string
        rationale:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        supporting_evidence_refs:
          type: array
          items:
            type: string
        caveats:
          type: array
          items:
            type: string
    ExperimentItem:
      type: object
      additionalProperties: false
      required:
        - id
        - hypothesis_id
        - title
        - channel
        - content_format
        - hook
        - cta
        - target_metric
        - success_criteria
        - scheduled_at
        - production_brief
      properties:
        id:
          type: string
          pattern: "^exp_[A-Za-z0-9_]+$"
        hypothesis_id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        title:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
        content_format:
          type: string
        hook:
          type: string
        cta:
          type: string
        target_metric:
          type: string
        success_criteria:
          type: string
        scheduled_at:
          type: string
          format: date-time
        production_brief:
          type: string
    ExperimentPlan:
      type: object
      additionalProperties: false
      required: [id, summary, overall_confidence, items]
      properties:
        id:
          type: string
          pattern: "^plan_[A-Za-z0-9_]+$"
        summary:
          type: string
        overall_confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentItem"
    AgentResultPayload:
      type: object
      additionalProperties: false
      required: [signals, hypotheses, experiment_plan]
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        hypotheses:
          type: array
          items:
            $ref: "#/components/schemas/Hypothesis"
        experiment_plan:
          $ref: "#/components/schemas/ExperimentPlan"
    ToolCallStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCESS, FAILED]
    ToolCallLog:
      type: object
      additionalProperties: false
      required: [sequence, tool_name, status, duration_ms]
      properties:
        sequence:
          type: integer
          minimum: 1
        tool_name:
          type: string
        status:
          $ref: "#/components/schemas/ToolCallStatus"
        duration_ms:
          type:
            - integer
            - "null"
          minimum: 0
        error_message:
          type:
            - string
            - "null"
    ApprovalGateRequest:
      type: object
      additionalProperties: false
      required: [approval_id, gate, payload]
      properties:
        approval_id:
          type: string
          pattern: "^appr_[A-Za-z0-9_]+$"
        gate:
          $ref: "#/components/schemas/ApprovalGateKind"
        payload:
          $ref: "#/components/schemas/AgentResultPayload"
    CalendarEventRef:
      type: object
      additionalProperties: false
      required: [event_id, title, scheduled_at]
      properties:
        event_id:
          type: string
          pattern: "^cal_[A-Za-z0-9_]+$"
        title:
          type: string
        scheduled_at:
          type: string
          format: date-time
    ApprovalCommitResult:
      type: object
      additionalProperties: false
      required: [approval_id, growth_brief_id, created_calendar_events, persisted_at]
      properties:
        approval_id:
          type: string
          pattern: "^appr_[A-Za-z0-9_]+$"
        growth_brief_id:
          type: string
          pattern: "^brief_[A-Za-z0-9_]+$"
        created_calendar_events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEventRef"
        persisted_at:
          type: string
          format: date-time
    ReplayScope:
      type: string
      enum: [missed_events, full_timeline]
    AgentStreamServerEvent:
      type: object
      additionalProperties: false
      required: [event_id, type, occurred_at]
      properties:
        event_id:
          type: string
        type:
          $ref: "#/components/schemas/AgentStreamServerEventType"
        agent_run_id:
          type:
            - string
            - "null"
          pattern: "^run_[A-Za-z0-9_]+$"
        session_id:
          type:
            - string
            - "null"
        sequence:
          type:
            - integer
            - "null"
          minimum: 1
          description: >
            Monotonic per-agent-run sequence for persisted timeline events.
            Connection control events may omit sequence.
        occurred_at:
          type: string
          format: date-time
        status:
          oneOf:
            - $ref: "#/components/schemas/AgentRunStatus"
            - type: "null"
        replay_scope:
          oneOf:
            - $ref: "#/components/schemas/ReplayScope"
            - type: "null"
        last_replayed_sequence:
          type:
            - integer
            - "null"
          minimum: 0
        next_expected_sequence:
          type:
            - integer
            - "null"
          minimum: 1
        step:
          oneOf:
            - $ref: "#/components/schemas/AgentStepSnapshot"
            - type: "null"
        message:
          oneOf:
            - $ref: "#/components/schemas/AgentMessage"
            - type: "null"
        document:
          oneOf:
            - $ref: "#/components/schemas/AgentDocument"
            - type: "null"
        observation:
          oneOf:
            - $ref: "#/components/schemas/AgentObservation"
            - type: "null"
        tool_call:
          oneOf:
            - $ref: "#/components/schemas/ToolCallLog"
            - type: "null"
        payload:
          oneOf:
            - $ref: "#/components/schemas/AgentResultPayload"
            - type: "null"
        approval_result:
          oneOf:
            - $ref: "#/components/schemas/ApprovalCommitResult"
            - type: "null"
        approval:
          oneOf:
            - $ref: "#/components/schemas/ApprovalGateRequest"
            - type: "null"
        error_message:
          type:
            - string
            - "null"
    ConnectionResumeCommand:
      type: object
      additionalProperties: false
      required: [command_id, type, client_id, agent_run_id, last_received_sequence]
      properties:
        command_id:
          type: string
          description: Request correlation id for this resume attempt.
        type:
          type: string
          const: connection.resume
        client_id:
          type: string
        session_id:
          type:
            - string
            - "null"
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        last_received_sequence:
          type: integer
          minimum: 0
          description: Last persisted timeline event the client fully applied.
    ConnectionFullSyncCommand:
      type: object
      additionalProperties: false
      required: [command_id, type, client_id, agent_run_id]
      properties:
        command_id:
          type: string
          description: Request correlation id for the full timeline replay request.
        type:
          type: string
          const: connection.full_sync
        client_id:
          type: string
        session_id:
          type:
            - string
            - "null"
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
    RuntimeCommandBase:
      type: object
      additionalProperties: false
      required: [command_id, type, agent_run_id]
      properties:
        command_id:
          type: string
          description: Idempotency key. The server must execute the same command_id at most once.
        type:
          type: string
          enum:
            - run.cancel
            - approval.update_payload
            - approval.approve
            - approval.reject
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        approval_id:
          type:
            - string
            - "null"
          pattern: "^appr_[A-Za-z0-9_]+$"
        final_experiments:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/ExperimentItem"
        reason:
          type:
            - string
            - "null"
    AgentStreamClientCommand:
      oneOf:
        - $ref: "#/components/schemas/ConnectionResumeCommand"
        - $ref: "#/components/schemas/ConnectionFullSyncCommand"
        - $ref: "#/components/schemas/RuntimeCommandBase"
    AgentStreamAck:
      type: object
      additionalProperties: false
      required: [ok, command_id, agent_run_id, accepted_at]
      properties:
        ok:
          type: boolean
          const: true
        command_id:
          type: string
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        accepted_at:
          type: string
          format: date-time
