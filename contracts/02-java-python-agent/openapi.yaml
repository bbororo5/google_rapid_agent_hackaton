openapi: 3.1.0
info:
  title: LaunchPilot Java-Python Agent Core API
  version: 1.0.0
  description: Internal conversation turn API from Java to Python Agent Core.
servers:
  - url: http://agent-service:8000/internal/agent
paths:
  /turns:
    post:
      operationId: sendAgentTurn
      summary: Send a user turn and thread context to Agent Core.
      parameters:
        - $ref: "#/components/parameters/TraceparentHeader"
        - $ref: "#/components/parameters/LaunchPilotRequestIdHeader"
        - $ref: "#/components/parameters/LaunchPilotTraceIdHeader"
        - $ref: "#/components/parameters/LaunchPilotThreadIdHeader"
        - $ref: "#/components/parameters/LaunchPilotWorkspaceIdHeader"
        - $ref: "#/components/parameters/LaunchPilotCampaignIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalAgentTurn"
      responses:
        "202":
          description: Turn accepted for agent processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAgentTurnAccepted"
components:
  parameters:
    TraceparentHeader:
      name: traceparent
      in: header
      required: false
      schema:
        type: string
        pattern: "^00-[a-f0-9]{32}-[a-f0-9]{16}-[0-9a-f]{2}$"
      description: W3C trace context propagated by Java Backend.
    LaunchPilotRequestIdHeader:
      name: x-launchpilot-request-id
      in: header
      required: false
      schema:
        type: string
        pattern: "^req_[A-Za-z0-9_]+$"
    LaunchPilotTraceIdHeader:
      name: x-launchpilot-trace-id
      in: header
      required: false
      schema:
        type: string
    LaunchPilotThreadIdHeader:
      name: x-launchpilot-thread-id
      in: header
      required: false
      schema:
        type: string
        pattern: "^thread_[A-Za-z0-9_]+$"
    LaunchPilotWorkspaceIdHeader:
      name: x-launchpilot-workspace-id
      in: header
      required: false
      schema:
        type: string
    LaunchPilotCampaignIdHeader:
      name: x-launchpilot-campaign-id
      in: header
      required: false
      schema:
        type: string
  schemas:
    TraceContext:
      type: object
      additionalProperties: false
      required: [request_id, source]
      properties:
        request_id:
          type: string
          pattern: "^req_[A-Za-z0-9_]+$"
        source:
          type: string
          enum: [java-backend]
        otel_trace_id:
          type:
            - string
            - "null"
          pattern: "^[a-f0-9]{32}$"
    AttachmentRef:
      type: object
      additionalProperties: false
      required: [kind, id]
      properties:
        kind:
          type: string
          enum: [csv_import, growth_brief, document, artifact]
        id:
          type: string
    InternalAgentTurn:
      type: object
      additionalProperties: false
      required: [thread_id, workspace_id, campaign_id, content, client_created_at, trace_context]
      properties:
        thread_id:
          type: string
          pattern: "^thread_[A-Za-z0-9_]+$"
        workspace_id:
          type: string
        campaign_id:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 4000
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentRef"
        client_created_at:
          type: string
          format: date-time
        trace_context:
          $ref: "#/components/schemas/TraceContext"
    InternalAgentTurnAccepted:
      type: object
      additionalProperties: false
      required: [ok, thread_id, accepted_at]
      properties:
        ok:
          type: boolean
          const: true
        thread_id:
          type: string
          pattern: "^thread_[A-Za-z0-9_]+$"
        accepted_at:
          type: string
          format: date-time
