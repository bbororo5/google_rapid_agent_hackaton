asyncapi: 2.6.0
info:
  title: LaunchPilot Internal Agent Core Stream
  version: 1.0.0
  description: Internal user-safe block stream from Python Agent Core to Java.
servers:
  local:
    url: agent-service:8000/internal/agent
    protocol: ws
channels:
  /threads/{thread_id}/stream:
    description: Internal block stream for one conversation thread.
    parameters:
      thread_id:
        description: Conversation thread identifier.
    subscribe:
      summary: Receive user-safe block messages from Agent Core.
      message:
        $ref: "#/components/messages/InternalStreamMessage"
components:
  messages:
    InternalStreamMessage:
      name: InternalStreamMessage
      contentType: application/json
      payload:
        $ref: "#/components/schemas/InternalStreamMessage"
      examples:
        - name: internalStreamMessage
          payload:
            $ref: "./examples/internal-stream-message.json"
  schemas:
    InternalStreamMessage:
      type: object
      additionalProperties: false
      required: [id, thread_id, sequence, role, created_at, blocks]
      properties:
        id:
          type: string
          pattern: "^msg_[A-Za-z0-9_]+$"
        thread_id:
          type: string
          pattern: "^thread_[A-Za-z0-9_]+$"
        sequence:
          type: integer
          minimum: 1
        role:
          type: string
          enum: [assistant, system]
        created_at:
          type: string
          format: date-time
        blocks:
          type: array
          minItems: 1
          items:
            type: object
            required: [kind]
            properties:
              kind:
                type: string
                enum: [text, activity, markdown_document, artifact, approval, result, error]
