asyncapi: 2.6.0
info:
  title: LaunchPilot Internal Agent Workflow Stream
  version: 0.1.0
  description: >
    AsyncAPI contract for active workflow events streamed from the Python
    FastAPI Agent Service to the Java Spring Boot backend. REST run creation,
    snapshot recovery, and cancel fallback are defined in openapi.yaml.
servers:
  local:
    url: agent-service:8000/internal/agent
    protocol: ws
    description: Local Python Agent internal WebSocket server.
  production:
    url: agent-service.internal:8000/internal/agent
    protocol: ws
    description: Production internal Python Agent WebSocket server.
channels:
  /runs/{agent_run_id}/stream:
    description: Active workflow event stream for a Java-generated agent run.
    parameters:
      agent_run_id:
        description: Agent run identifier generated by Java and accepted by Python.
    subscribe:
      summary: Receive user-safe workflow events from Python as the agent analyzes evidence and drafts experiments.
      message:
        $ref: "#/components/messages/AgentWorkflowEvent"
    publish:
      summary: Send operational commands from Java to Python while the run is active.
      message:
        $ref: "#/components/messages/InternalAgentCommand"
components:
  messages:
    AgentWorkflowEvent:
      name: AgentWorkflowEvent
      title: Python agent workflow event
      contentType: application/json
      payload:
        $ref: "#/components/schemas/AgentWorkflowEvent"
      examples:
        - name: observationCreated
          summary: Python emits a grounded observation while evidence analysis is running.
          payload:
            $ref: "./examples/agent-workflow-observation-created-event.json"
        - name: experimentPlanDrafted
          summary: Python emits the final draft event before Java opens the approval gate.
          payload:
            $ref: "./examples/agent-workflow-experiment-plan-drafted-event.json"
    InternalAgentCommand:
      name: InternalAgentCommand
      title: Java command to Python agent stream
      contentType: application/json
      payload:
        $ref: "#/components/schemas/InternalAgentCommand"
      examples:
        - name: cancelRun
          summary: Java asks Python to cancel active agent work.
          payload:
            $ref: "./examples/internal-agent-cancel-command.json"
  schemas:
    DateRange:
      type: object
      additionalProperties: false
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    Channel:
      type: string
      enum: [youtube, tiktok, instagram, x, unknown]
    Confidence:
      type: string
      enum: [low, medium, medium_high, high]
    AgentRunStatus:
      type: string
      enum:
        - PENDING
        - RUNNING_SIGNAL_DETECTION
        - RUNNING_EVIDENCE_SEARCH
        - RUNNING_HYPOTHESIS_GENERATION
        - RUNNING_EXPERIMENT_GENERATION
        - WAITING_FOR_APPROVAL
        - SUCCESS
        - FAILED
        - CANCELLED
    AgentRunStage:
      type: string
      enum:
        - IMPORT_METRICS
        - DETECT_PERFORMANCE_SIGNAL
        - GROUND_WITH_EVIDENCE
        - GENERATE_HYPOTHESIS
        - DRAFT_EXPERIMENT_PLAN
        - WAIT_FOR_APPROVAL
        - APPLY_APPROVED_PLAN
    AgentStepStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, SKIPPED]
    AgentObservationKind:
      type: string
      enum: [progress, evidence, signal, hypothesis, plan, warning]
    AgentWorkflowEventType:
      type: string
      enum:
        - run.started
        - step.updated
        - observation.created
        - signal.detected
        - hypothesis.created
        - experiment_plan.drafted
        - run.cancelled
        - run.failed
    InternalAgentCommandType:
      type: string
      enum:
        - run.cancel
    AgentStepSnapshot:
      type: object
      additionalProperties: false
      required: [id, order, stage, status]
      properties:
        id:
          type: string
        order:
          type: integer
          minimum: 1
        stage:
          $ref: "#/components/schemas/AgentRunStage"
        status:
          $ref: "#/components/schemas/AgentStepStatus"
    AgentObservation:
      type: object
      additionalProperties: false
      required: [id, kind, title, summary]
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/AgentObservationKind"
        title:
          type: string
        summary:
          type: string
          description: User-visible summary. Do not include private chain-of-thought.
        evidence_refs:
          type: array
          items:
            type: string
    Signal:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - title
        - description
        - metric_name
        - current_value
        - baseline_value
        - lift_ratio
        - date_window
        - confidence
        - evidence_refs
      properties:
        id:
          type: string
          pattern: "^sig_[A-Za-z0-9_]+$"
        type:
          type: string
        title:
          type: string
        description:
          type: string
        metric_name:
          type: string
        current_value:
          type: number
        baseline_value:
          type: number
        lift_ratio:
          type: number
        date_window:
          $ref: "#/components/schemas/DateRange"
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence_refs:
          type: array
          items:
            type: string
    Hypothesis:
      type: object
      additionalProperties: false
      required:
        - id
        - signal_ids
        - statement
        - rationale
        - confidence
        - supporting_evidence_refs
        - caveats
      properties:
        id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        signal_ids:
          type: array
          items:
            type: string
            pattern: "^sig_[A-Za-z0-9_]+$"
        statement:
          type: string
        rationale:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        supporting_evidence_refs:
          type: array
          items:
            type: string
        caveats:
          type: array
          items:
            type: string
    ExperimentItem:
      type: object
      additionalProperties: false
      required:
        - id
        - hypothesis_id
        - title
        - channel
        - content_format
        - hook
        - cta
        - target_metric
        - success_criteria
        - scheduled_at
        - production_brief
      properties:
        id:
          type: string
          pattern: "^exp_[A-Za-z0-9_]+$"
        hypothesis_id:
          type: string
          pattern: "^hyp_[A-Za-z0-9_]+$"
        title:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
        content_format:
          type: string
        hook:
          type: string
        cta:
          type: string
        target_metric:
          type: string
        success_criteria:
          type: string
        scheduled_at:
          type: string
          format: date-time
        production_brief:
          type: string
    ExperimentPlan:
      type: object
      additionalProperties: false
      required: [id, summary, overall_confidence, items]
      properties:
        id:
          type: string
          pattern: "^plan_[A-Za-z0-9_]+$"
        summary:
          type: string
        overall_confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentItem"
    AgentResultPayload:
      type: object
      additionalProperties: false
      required: [signals, hypotheses, experiment_plan]
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        hypotheses:
          type: array
          items:
            $ref: "#/components/schemas/Hypothesis"
        experiment_plan:
          $ref: "#/components/schemas/ExperimentPlan"
    AgentWorkflowEvent:
      type: object
      additionalProperties: false
      required: [event_id, type, agent_run_id, sequence, occurred_at]
      properties:
        event_id:
          type: string
        type:
          $ref: "#/components/schemas/AgentWorkflowEventType"
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        sequence:
          type: integer
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AgentRunStatus"
        step:
          oneOf:
            - $ref: "#/components/schemas/AgentStepSnapshot"
            - type: "null"
        observation:
          oneOf:
            - $ref: "#/components/schemas/AgentObservation"
            - type: "null"
        payload:
          oneOf:
            - $ref: "#/components/schemas/AgentResultPayload"
            - type: "null"
        error_message:
          type:
            - string
            - "null"
    InternalAgentCommand:
      type: object
      additionalProperties: false
      required: [command_id, type, agent_run_id]
      properties:
        command_id:
          type: string
        type:
          $ref: "#/components/schemas/InternalAgentCommandType"
        agent_run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
        reason:
          type:
            - string
            - "null"
