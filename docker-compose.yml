# Run all three LaunchPilot services on one host.
#   cp .env.example .env   # fill GEMINI_API_KEY (AIza...) etc.
#   docker compose up --build
#
# .env feeds the Python agent external integrations such as Gemini and Phoenix.
# Local infrastructure hostnames are pinned below (for example Java reaches
# Python at http://agent:8000 and Elastic at http://elasticsearch:9200).
#
# Host ports are overridable (defaults in parens) so they don't clash with a
# local `next dev` / `uvicorn` you already run:
#   AGENT_HOST_PORT (8000) · BACKEND_HOST_PORT (8080) · FRONTEND_HOST_PORT (3000)
#   ALLOY_HOST_PORT (12345) · OTLP_GRPC_HOST_PORT (4317) · OTLP_HTTP_HOST_PORT (4318)
services:
  alloy:
    image: grafana/alloy:v1.11.0
    environment:
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
      GRAFANA_CLOUD_OTLP_INSTANCE_ID: ${GRAFANA_CLOUD_OTLP_INSTANCE_ID}
      GRAFANA_CLOUD_ACCESS_TOKEN: ${GRAFANA_CLOUD_ACCESS_TOKEN}
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "${ALLOY_HOST_PORT:-12345}:12345"
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
    volumes:
      - ./observability/grafana-cloud.alloy:/etc/alloy/config.alloy:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTIC_HOST_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  agent:
    build: ./apps/agent
    env_file: ${COMPOSE_ENV_FILE:-.env}
    environment:
      GOOGLE_GENAI_USE_VERTEXAI: ""
      GOOGLE_GENAI_USE_ENTERPRISE: ""
      GOOGLE_CLOUD_PROJECT: ""
      ELASTIC_URL: http://elasticsearch:9200
      ELASTIC_API_KEY: ""
      ELASTIC_USE_MCP: ""
      GRAFANA_CLOUD_OTLP_ENDPOINT: ""
      GRAFANA_CLOUD_OTLP_INSTANCE_ID: ""
      GRAFANA_CLOUD_ACCESS_TOKEN: ""
      OTEL_SERVICE_NAME: launchpilot-agent
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=launchpilot,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      # Redis hot tier for live SharedStateVector (ADR-005). Service hostname on
      # the compose network. Overrides any REDIS_URL leaking from .env.
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${AGENT_HOST_PORT:-8000}:8000"
    depends_on:
      alloy:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    # Volatile cache only (ADR-005): no persistence configured on purpose. Truth
    # stays in Elastic; Redis loss triggers rehydrate, not data loss.
    # Internal-only: the agent reaches it at redis://redis:6379 on the compose
    # network, so no host port is published (avoids clashing with other local
    # redis instances). Set REDIS_HOST_PORT in compose to expose for debugging.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: launchpilot-backend
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=launchpilot,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      AGENT_SERVICE_URL: http://agent:8000
      ELASTIC_URL: http://elasticsearch:9200
      ELASTIC_API_KEY: ""
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      alloy:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  frontend:
    # Context is the repo root because the frontend imports contract JSON from
    # ../contracts at build time. See apps/frontend/Dockerfile.
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Browser calls the host-mapped Java backend. Override via .env if needed.
        NEXT_PUBLIC_AGENT_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  elasticsearch-data:
