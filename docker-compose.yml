# Run all three LaunchPilot services on one host.
#   cp .env.example .env   # fill GEMINI_API_KEY (AIza...) etc.
#   docker compose up --build
#
# One .env feeds every service via env_file. Service names are the network
# hostnames (e.g. Java reaches Python at http://agent:8000).
#
# Host ports are overridable (defaults in parens) so they don't clash with a
# local `next dev` / `uvicorn` you already run:
#   AGENT_HOST_PORT (8000) · BACKEND_HOST_PORT (8080) · FRONTEND_HOST_PORT (3000)
services:
  agent:
    build: ./apps/agent
    env_file: .env
    # Vertex AI auth via ADC: mount the service-account key (host path from
    # GOOGLE_ADC_FILE in .env, default ./secrets/adc.json) read-only and point
    # the SDK at the in-container path. Overrides any host path leaking from .env.
    volumes:
      - "${GOOGLE_ADC_FILE:-./secrets/adc.json}:/secrets/adc.json:ro"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/adc.json
    ports:
      - "${AGENT_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    env_file: .env
    # AGENT_SERVICE_URL comes from .env as http://agent:8000 (the service name).
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      agent:
        condition: service_healthy

  frontend:
    # Context is the repo root because the frontend imports contract JSON from
    # ../contracts at build time. See apps/frontend/Dockerfile.
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file: .env
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
