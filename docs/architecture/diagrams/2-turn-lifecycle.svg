<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Segoe UI','Inter',system-ui,sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.1" fill="#e6eaf2"/></pattern>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="11" flood-color="#243b6b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#9aa6bd"/></marker>
    <marker id="ai" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#4f46e5"/></marker>
  </defs>

  <rect width="1600" height="900" fill="#fbfcfe"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <text x="90" y="92" fill="#0f172a" font-size="40" font-weight="700">Turn Lifecycle</text>
  <text x="90" y="130" fill="#64748b" font-size="20">One user turn: interpret free text into a StateDelta, let a deterministic reducer own the transition, then dispatch.</text>
  <rect x="90" y="148" width="96" height="4" rx="2" fill="#4f46e5"/>

  <!-- spine -->
  <g filter="url(#card)"><rect x="90" y="300" width="260" height="150" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="116" y="344" fill="#1e293b" font-size="21" font-weight="700">1 · Load</text>
    <text x="116" y="378" fill="#64748b" font-size="14.5">TurnContextLoader</text>
    <text x="116" y="404" fill="#64748b" font-size="14.5">resolve scope</text>
    <text x="116" y="428" fill="#64748b" font-size="14.5">(workspace + campaign)</text></g>

  <g filter="url(#card)"><rect x="380" y="300" width="260" height="150" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="406" y="344" fill="#1e293b" font-size="21" font-weight="700">2 · Interpret</text>
    <text x="406" y="378" fill="#64748b" font-size="14.5">LLM proposes a</text>
    <text x="406" y="402" fill="#64748b" font-size="14.5">StateDeltaProposal</text>
    <text x="406" y="428" fill="#94a3b8" font-size="13">intent · target_phase · confidence</text></g>

  <g filter="url(#card)"><rect x="670" y="300" width="260" height="150" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
    <text x="696" y="344" fill="#3730a3" font-size="21" font-weight="800">3 · Reduce</text>
    <text x="696" y="378" fill="#4f46e5" font-size="14.5">Deterministic guards</text>
    <text x="696" y="402" fill="#4f46e5" font-size="14.5">(TRANSITION_GRAPH)</text>
    <text x="696" y="428" fill="#6366f1" font-size="13">LLM proposes, code owns transition</text></g>

  <g filter="url(#card)"><rect x="960" y="300" width="260" height="150" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="986" y="344" fill="#1e293b" font-size="21" font-weight="700">4 · Route</text>
    <text x="986" y="378" fill="#64748b" font-size="14.5">TurnRouter selects</text>
    <text x="986" y="402" fill="#64748b" font-size="14.5">one delegation mode</text>
    <text x="986" y="428" fill="#94a3b8" font-size="13">see 4 modes below</text></g>

  <g filter="url(#card)"><rect x="1250" y="300" width="260" height="150" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="1276" y="344" fill="#1e293b" font-size="21" font-weight="700">5 · Persist</text>
    <text x="1276" y="378" fill="#64748b" font-size="14.5">Commit SharedStateVector</text>
    <text x="1276" y="402" fill="#64748b" font-size="14.5">+ Checkpoint to Elastic</text>
    <text x="1276" y="428" fill="#94a3b8" font-size="13">runtime episode (if commit_state)</text></g>

  <g fill="none" stroke="#9aa6bd" stroke-width="2.4">
    <path d="M350 375 H380" marker-end="url(#a)"/>
    <path d="M640 375 H670" marker-end="url(#a)"/>
    <path d="M930 375 H960" marker-end="url(#a)"/>
    <path d="M1220 375 H1250" marker-end="url(#a)"/>
  </g>

  <!-- note: csv forces analysis -->
  <text x="510" y="282" text-anchor="middle" fill="#94a3b8" font-size="13">CSV attachment forces START_ANALYSIS</text>

  <!-- mode fan -->
  <path d="M1090 450 V480 H780 V508" fill="none" stroke="#9aa6bd" stroke-width="2"/>
  <text x="90" y="528" fill="#0f172a" font-size="18" font-weight="700">Delegation modes (one per turn)</text>

  <g font-size="15">
    <g filter="url(#card)"><rect x="90" y="548" width="340" height="84" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="112" y="582" fill="#1e293b" font-size="17" font-weight="700">DIRECT</text>
      <text x="112" y="608" fill="#64748b">chat reply / artifact query from state</text></g>
    <g filter="url(#card)"><rect x="460" y="548" width="340" height="84" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="482" y="582" fill="#1e293b" font-size="17" font-weight="700">DELEGATE</text>
      <text x="482" y="608" fill="#64748b">record phase-local revision intent</text></g>
    <g filter="url(#card)"><rect x="830" y="548" width="340" height="84" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
      <text x="852" y="582" fill="#3730a3" font-size="17" font-weight="800">RERUN</text>
      <text x="852" y="608" fill="#4f46e5">run ONE target-phase worker</text></g>
    <g filter="url(#card)"><rect x="1200" y="548" width="310" height="84" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="1222" y="582" fill="#1e293b" font-size="17" font-weight="700">CLARIFY</text>
      <text x="1222" y="608" fill="#64748b">ask confirm (low confidence)</text></g>
  </g>

  <!-- rerun callout -->
  <path d="M1000 632 V690" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#ai)"/>
  <g filter="url(#card)"><rect x="470" y="694" width="1040" height="96" rx="16" fill="#fff" stroke="#c7cef5" stroke-width="1.5"/>
    <text x="496" y="730" fill="#3730a3" font-size="18" font-weight="700">RERUN runs a single phase runner for the current phase.</text>
    <text x="496" y="762" fill="#64748b" font-size="15.5">Free-text intent can target any phase, so agents run individually and out of order &#8594; see Nonlinear Phase Graph.</text></g>
</svg>
