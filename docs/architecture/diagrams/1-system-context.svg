<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Segoe UI','Inter',system-ui,sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.1" fill="#e6eaf2"/></pattern>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="11" flood-color="#243b6b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#9aa6bd"/></marker>
    <marker id="ai" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#4f46e5"/></marker>
  </defs>

  <rect width="1600" height="900" fill="#fbfcfe"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <text x="90" y="92" fill="#0f172a" font-size="40" font-weight="700">System Context</text>
  <text x="90" y="130" fill="#64748b" font-size="20">LaunchPilot turns creator SNS performance CSVs into signals, hypotheses, and testable experiments.</text>
  <rect x="90" y="148" width="96" height="4" rx="2" fill="#4f46e5"/>

  <!-- edges -->
  <g fill="none" stroke="#9aa6bd" stroke-width="2.2">
    <path d="M372 452 H560" marker-end="url(#a)"/>
    <path d="M960 408 C1050 360, 1100 308, 1182 280" marker-end="url(#a)"/>
    <path d="M960 452 H1182" marker-end="url(#a)"/>
    <path d="M960 496 C1050 560, 1100 612, 1182 640" marker-end="url(#a)"/>
  </g>
  <path d="M560 514 C440 596, 320 596, 250 524" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#ai)"/>

  <g font-size="15.5" fill="#64748b">
    <text x="466" y="436" text-anchor="middle">upload CSV / approve plan</text>
    <text x="1060" y="316" text-anchor="middle">reason &amp; generate</text>
    <text x="1090" y="436" text-anchor="middle">read evidence / write approved</text>
    <text x="1070" y="592" text-anchor="middle">trace &amp; reflect</text>
    <text x="402" y="600" text-anchor="middle" fill="#4f46e5">signals · hypotheses · live reasoning</text>
  </g>

  <!-- Person -->
  <g filter="url(#card)">
    <rect x="120" y="392" width="252" height="120" rx="18" fill="#f4f6fb" stroke="#d7deea" stroke-width="1.5"/>
    <circle cx="170" cy="436" r="14" fill="#cbd5e1"/><rect x="152" y="454" width="36" height="20" rx="10" fill="#cbd5e1"/>
    <text x="208" y="442" fill="#1e293b" font-size="20" font-weight="700">Content /</text>
    <text x="208" y="468" fill="#1e293b" font-size="20" font-weight="700">Growth Manager</text>
    <text x="140" y="500" fill="#94a3b8" font-size="13">Person</text>
  </g>

  <!-- LaunchPilot -->
  <g filter="url(#card)">
    <rect x="560" y="332" width="400" height="232" rx="22" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
    <text x="760" y="404" text-anchor="middle" fill="#3730a3" font-size="30" font-weight="800">LaunchPilot</text>
    <text x="760" y="436" text-anchor="middle" fill="#4f46e5" font-size="18">Multi-agent system</text>
    <g font-size="14.5">
      <rect x="596" y="466" width="156" height="62" rx="12" fill="#fff" stroke="#c7cef5"/>
      <text x="674" y="492" text-anchor="middle" fill="#1e293b" font-weight="600">Next.js</text><text x="674" y="513" text-anchor="middle" fill="#64748b">Frontend</text>
      <rect x="768" y="466" width="156" height="62" rx="12" fill="#fff" stroke="#c7cef5"/>
      <text x="846" y="492" text-anchor="middle" fill="#1e293b" font-weight="600">Java + Python</text><text x="846" y="513" text-anchor="middle" fill="#64748b">Gateway · Agent Core</text>
    </g>
  </g>

  <!-- externals -->
  <g filter="url(#card)"><rect x="1182" y="222" width="318" height="116" rx="18" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="1210" y="270" fill="#1e293b" font-size="24" font-weight="700">Gemini</text>
    <text x="1210" y="300" fill="#64748b" font-size="15.5">Reasoning &amp; generation (LLM)</text></g>
  <g filter="url(#card)"><rect x="1182" y="394" width="318" height="116" rx="18" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="1210" y="442" fill="#1e293b" font-size="24" font-weight="700">Elastic</text>
    <text x="1210" y="472" fill="#64748b" font-size="15.5">Evidence + single store</text></g>
  <g filter="url(#card)"><rect x="1182" y="566" width="318" height="116" rx="18" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="1210" y="614" fill="#1e293b" font-size="24" font-weight="700">Phoenix / Arize</text>
    <text x="1210" y="644" fill="#64748b" font-size="15.5">Self-reflection (L4 traces)</text></g>

  <!-- legend -->
  <g font-size="14.5" transform="translate(90,800)">
    <rect x="0" y="0" width="18" height="18" rx="5" fill="#eef2ff" stroke="#4f46e5"/><text x="28" y="14" fill="#64748b">Product boundary</text>
    <rect x="190" y="0" width="18" height="18" rx="5" fill="#fff" stroke="#e2e8f0"/><text x="218" y="14" fill="#64748b">External system</text>
    <rect x="380" y="0" width="18" height="18" rx="5" fill="#f4f6fb" stroke="#d7deea"/><text x="408" y="14" fill="#64748b">Person</text>
    <line x1="500" y1="9" x2="534" y2="9" stroke="#4f46e5" stroke-width="2.2"/><text x="544" y="14" fill="#64748b">result returned to user</text>
  </g>
</svg>
