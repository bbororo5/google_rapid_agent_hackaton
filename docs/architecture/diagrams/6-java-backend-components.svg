<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Java Backend Component Boundaries</title>
  <desc id="desc">LaunchPilot Java backend internal components after boundary separation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}
      .title{font:800 38px 'Segoe UI',Inter,Arial,sans-serif;fill:#0f172a}
      .subtitle{font:500 18px 'Segoe UI',Inter,Arial,sans-serif;fill:#64748b}
      .container{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:18;filter:url(#shadow)}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:14}
      .adapter{fill:#eff6ff;stroke:#2563eb}
      .application{fill:#f0fdf4;stroke:#16a34a}
      .bridge{fill:#fefce8;stroke:#ca8a04}
      .persistence{fill:#fff7ed;stroke:#ea580c}
      .observability{fill:#f5f3ff;stroke:#7c3aed}
      .contracts{fill:#f8fafc;stroke:#64748b}
      .external{fill:#ffffff;stroke:#475569;stroke-dasharray:8 8;rx:14}
      .label{font:800 20px 'Segoe UI',Inter,Arial,sans-serif;fill:#0f172a}
      .pkg{font:600 13px 'Segoe UI',Inter,Arial,sans-serif;fill:#475569}
      .body{font:500 14px 'Segoe UI',Inter,Arial,sans-serif;fill:#334155}
      .small{font:500 12px 'Segoe UI',Inter,Arial,sans-serif;fill:#64748b}
      .edge{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .edge-muted{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
      .edge-obs{fill:none;stroke:#7c3aed;stroke-width:2;stroke-dasharray:6 7;marker-end:url(#arrow)}
      .lane{font:700 13px 'Segoe UI',Inter,Arial,sans-serif;fill:#64748b;text-transform:uppercase;letter-spacing:.06em}
    </style>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text x="70" y="70" class="title">Java Backend Component Boundaries</text>
  <text x="70" y="102" class="subtitle">Deterministic product gateway: frontend contracts, command routing, approval commits, Elastic writes, and Java-side observability.</text>

  <rect x="250" y="150" width="980" height="715" class="container"/>
  <text x="285" y="192" class="lane">Java Backend Container · Spring Boot</text>

  <rect x="60" y="285" width="145" height="90" class="external"/>
  <text x="132" y="322" text-anchor="middle" class="label">Frontend</text>
  <text x="132" y="350" text-anchor="middle" class="small">Next.js</text>

  <rect x="1295" y="245" width="145" height="92" class="external"/>
  <text x="1367" y="282" text-anchor="middle" class="label">Python</text>
  <text x="1367" y="310" text-anchor="middle" class="small">Agent Core</text>

  <rect x="1295" y="565" width="145" height="92" class="external"/>
  <text x="1367" y="602" text-anchor="middle" class="label">Elastic</text>
  <text x="1367" y="630" text-anchor="middle" class="small">Business store</text>

  <rect x="1295" y="765" width="145" height="92" class="external"/>
  <text x="1367" y="802" text-anchor="middle" class="label">Cloud Ops</text>
  <text x="1367" y="830" text-anchor="middle" class="small">Logs / traces</text>

  <rect x="300" y="250" width="210" height="105" class="box adapter"/>
  <text x="405" y="285" text-anchor="middle" class="label">API Adapter</text>
  <text x="405" y="309" text-anchor="middle" class="pkg">api</text>
  <text x="405" y="334" text-anchor="middle" class="body">HTTP controllers</text>

  <rect x="300" y="395" width="210" height="115" class="box adapter"/>
  <text x="405" y="430" text-anchor="middle" class="label">WebSocket Adapter</text>
  <text x="405" y="454" text-anchor="middle" class="pkg">websocket</text>
  <text x="405" y="480" text-anchor="middle" class="body">Frontend stream</text>

  <rect x="585" y="235" width="245" height="120" class="box application"/>
  <text x="707" y="270" text-anchor="middle" class="label">Importing</text>
  <text x="707" y="294" text-anchor="middle" class="pkg">importing</text>
  <text x="707" y="320" text-anchor="middle" class="body">ImportUseCase</text>
  <text x="707" y="340" text-anchor="middle" class="small">CSV parse + import thread registration</text>

  <rect x="585" y="395" width="245" height="125" class="box application"/>
  <text x="707" y="430" text-anchor="middle" class="label">Conversation</text>
  <text x="707" y="454" text-anchor="middle" class="pkg">conversation</text>
  <text x="707" y="480" text-anchor="middle" class="body">Command + connection use cases</text>
  <text x="707" y="500" text-anchor="middle" class="small">timeline · approval gate · relay</text>

  <rect x="890" y="245" width="245" height="115" class="box bridge"/>
  <text x="1012" y="280" text-anchor="middle" class="label">Agent Bridge</text>
  <text x="1012" y="304" text-anchor="middle" class="pkg">agentbridge</text>
  <text x="1012" y="330" text-anchor="middle" class="body">AgentTurnPort · AgentStreamPort</text>

  <rect x="890" y="420" width="245" height="115" class="box application"/>
  <text x="1012" y="455" text-anchor="middle" class="label">Approval</text>
  <text x="1012" y="479" text-anchor="middle" class="pkg">approval</text>
  <text x="1012" y="505" text-anchor="middle" class="body">ApprovalUseCase</text>

  <rect x="890" y="605" width="245" height="125" class="box persistence"/>
  <text x="1012" y="640" text-anchor="middle" class="label">Elastic Persistence</text>
  <text x="1012" y="664" text-anchor="middle" class="pkg">persistence.elastic</text>
  <text x="1012" y="690" text-anchor="middle" class="body">Concrete repositories</text>
  <text x="1012" y="710" text-anchor="middle" class="small">index bootstrap · read/write adapters</text>

  <rect x="585" y="620" width="245" height="110" class="box observability"/>
  <text x="707" y="655" text-anchor="middle" class="label">Observability</text>
  <text x="707" y="679" text-anchor="middle" class="pkg">observability</text>
  <text x="707" y="705" text-anchor="middle" class="body">ObservabilityGateway</text>

  <rect x="300" y="625" width="210" height="105" class="box contracts"/>
  <text x="405" y="660" text-anchor="middle" class="label">Contracts</text>
  <text x="405" y="684" text-anchor="middle" class="pkg">contracts.*</text>
  <text x="405" y="710" text-anchor="middle" class="body">External records only</text>

  <rect x="300" y="765" width="210" height="72" class="box contracts"/>
  <text x="405" y="793" text-anchor="middle" class="label">Config / Common</text>
  <text x="405" y="817" text-anchor="middle" class="pkg">config · common</text>

  <path class="edge" d="M205 315 H300"/>
  <text x="252" y="303" text-anchor="middle" class="small">HTTP</text>

  <path class="edge" d="M205 352 C240 352 252 452 300 452"/>
  <text x="253" y="415" text-anchor="middle" class="small">WS</text>

  <path class="edge" d="M510 302 H585"/>
  <text x="548" y="290" text-anchor="middle" class="small">ImportUseCase</text>

  <path class="edge" d="M510 452 H585"/>
  <text x="548" y="440" text-anchor="middle" class="small">Conversation use cases</text>

  <path class="edge" d="M830 445 C858 432 860 338 890 315"/>
  <text x="862" y="375" text-anchor="middle" class="small">free-form turn</text>

  <path class="edge" d="M830 480 H890"/>
  <text x="860" y="468" text-anchor="middle" class="small">approve</text>

  <path class="edge" d="M1135 302 H1295"/>
  <text x="1215" y="290" text-anchor="middle" class="small">POST /turns + internal WS</text>

  <path class="edge-muted" d="M1295 326 C1225 385 1185 392 1135 420"/>
  <text x="1216" y="382" text-anchor="middle" class="small">safe blocks</text>

  <path class="edge" d="M707 355 C707 570 878 600 925 605"/>
  <text x="765" y="570" text-anchor="middle" class="small">campaign/content ports</text>

  <path class="edge" d="M1012 535 V605"/>
  <text x="1068" y="575" text-anchor="middle" class="small">approval port</text>

  <path class="edge" d="M1135 668 H1295"/>
  <text x="1215" y="656" text-anchor="middle" class="small">Elasticsearch client</text>

  <path class="edge-obs" d="M585 675 C520 650 505 545 550 500"/>
  <path class="edge-obs" d="M830 675 H890"/>
  <path class="edge-obs" d="M830 655 C850 610 870 545 890 505"/>
  <path class="edge-obs" d="M830 690 C866 720 890 715 930 710"/>
  <path class="edge-obs" d="M830 635 C870 565 880 345 890 320"/>
  <path class="edge-obs" d="M830 707 C1040 790 1190 810 1295 810"/>
  <text x="707" y="764" text-anchor="middle" class="small">business components emit boundary events through ObservabilityGateway</text>

  <path class="edge-muted" d="M510 675 H585"/>
  <text x="548" y="663" text-anchor="middle" class="small">records</text>

  <rect x="70" y="895" width="1360" height="48" fill="#ffffff" stroke="#e2e8f0" rx="12"/>
  <text x="95" y="925" class="small">Rule: Java has no internal agentcore component. Agent Core is the external Python container; Java talks to it only through agentbridge.</text>
</svg>
